<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tipos de Parque')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container my-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0 text-success-emphasis">
            <i class="bi bi-tags-fill me-2"></i>Gestión de Tipos de Parque
        </h2>
        <a th:href="@{/tipos-parque/nuevo}" class="btn btn-success">
            <i class="bi bi-plus-circle me-1"></i>Nuevo Tipo de Parque
        </a>
    </div>

    <!-- Alertas de éxito / error -->
    <div th:replace="~{fragments/layout :: alertas}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-striped align-middle mb-0">
                    <thead class="table-success">
                    <tr>
                        <th scope="col" style="width: 100px;">ID</th>
                        <th scope="col">Descripción</th>
                        <th scope="col" class="text-end" style="width: 220px;">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="tipo : ${tipos}">
                        <td th:text="${tipo.idTipoParque}">1</td>
                        <td th:text="${tipo.descripcion}">Descripción</td>
                        <td class="text-end">
                            <a th:href="@{/tipos-parque/editar/{id}(id=${tipo.idTipoParque})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil-square me-1"></i>Editar
                            </a>
                            <!-- Eliminación con confirmación -->
                            <form th:action="@{/tipos-parque/eliminar/{id}(id=${tipo.idTipoParque})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('¿Está seguro de eliminar este tipo de parque?');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">
                                    <i class="bi bi-trash me-1"></i>Eliminar
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(tipos)}">
                        <td colspan="3" class="text-center text-muted py-4">
                            <i class="bi bi-inbox me-1"></i>No hay tipos de parque registrados.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
