<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Formulario Tipo de Parque')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <h2 class="mb-4 text-success-emphasis">
                <i class="bi" th:classappend="${modoEdicion} ? 'bi-pencil-square' : 'bi-plus-circle'"></i>
                <span th:text="${modoEdicion} ? 'Editar Tipo de Parque' : 'Nuevo Tipo de Parque'">Título</span>
            </h2>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/tipos-parque/guardar}" th:object="${tipoParque}" method="post">
                        <!-- id oculto: presente solo en edición -->
                        <input type="hidden" th:field="*{idTipoParque}">

                        <div class="mb-3">
                            <label for="descripcion" class="form-label">Descripción</label>
                            <input type="text" class="form-control form-control-lg"
                                   id="descripcion" th:field="*{descripcion}"
                                   placeholder="Ej: Parque Nacional" maxlength="100" required>
                            <div class="form-text">Ingrese una descripción única (máx. 100 caracteres).</div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/tipos-parque}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left me-1"></i>Volver
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
