<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<!--
  Fragmentos reutilizables: head, navbar y footer.
  Se incluyen desde las demás páginas con th:replace.
-->
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} ? ${titulo} + ' · Parques Nacionales' : 'Parques Nacionales'">Parques Nacionales</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Estilos propios -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
<!-- ===================== NAVBAR ===================== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-parques shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-tree-fill me-2"></i>Parques Nacionales
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#menuPrincipal" aria-controls="menuPrincipal"
                aria-expanded="false" aria-label="Menú">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>Inicio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/parques}">
                        <i class="bi bi-tree me-1"></i>Parques
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/tipos-parque}">
                        <i class="bi bi-tags me-1"></i>Tipos de Parque
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/importacion}">
                        <i class="bi bi-filetype-csv me-1"></i>Importar CSV
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/organizaciones-distinguidas}">
                        <i class="bi bi-award me-1"></i>Org. Distinguidas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/info}">
                        <i class="bi bi-info-circle me-1"></i>Información
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ===================== FOOTER ===================== -->
<footer th:fragment="footer" class="footer-parques text-center text-light py-3 mt-5">
    <div class="container">
        <small>
            <i class="bi bi-tree-fill me-1"></i>
            Sistema de Parques Nacionales — Trabajo Práctico de Bases de Datos
        </small>
    </div>
</footer>

<!-- ===================== ALERTAS ===================== -->
<!-- Fragmento de alertas de éxito/error reutilizable -->
<div th:fragment="alertas">
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${exito}">Mensaje de éxito</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}">Mensaje de error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
</div>

<!-- Bootstrap JS (incluido una vez por fragmento "scripts") -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>
</body>
</html>
