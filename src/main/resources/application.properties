# ============================================================
#  Sistema de Parques Nacionales - Configuración
# ============================================================

spring.application.name=Sistema de Parques Nacionales
server.port=8080

# ------------------------------------------------------------
#  Conexión a SQL Server
#  Los valores se pueden sobrescribir con variables de entorno
#  (útil para Docker). Por defecto apunta a localhost (IntelliJ).
# ------------------------------------------------------------
app.db.host=${DB_HOST:localhost}
app.db.port=${DB_PORT:1433}
app.db.name=${DB_NAME:ParqueNacionalesDB}

spring.datasource.url=jdbc:sqlserver://${app.db.host}:${app.db.port};databaseName=${app.db.name};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:Parques2024!}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# El pool no debe fallar el arranque si la base aún no responde;
# el DatabaseInitializer se encarga de esperar y crear la base.
spring.datasource.hikari.initialization-fail-timeout=-1

# ------------------------------------------------------------
#  Thymeleaf
# ------------------------------------------------------------
spring.thymeleaf.cache=false

# ------------------------------------------------------------
#  Subida de archivos (importación CSV)
# ------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta donde se guardan los XML generados por la importación
app.importacion.carpeta-xml=${XML_DIR:xml-generados}
