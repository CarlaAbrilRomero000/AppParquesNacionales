# ============================================================
#  Sistema de Parques Nacionales - Configuración
# ============================================================

spring.application.name=Sistema de Parques Nacionales
server.port=8080

# ------------------------------------------------------------
#  Conexión a SQL Server
#  Por defecto (IntelliJ / local) se conecta a la base EXISTENTE
#  'ParquesNacionalesDB' usando Autenticación de Windows
#  (app.db.integrated-security=true), tal como está configurado el
#  SQL Server local (sin usuario/clave). Requiere la DLL nativa
#  'mssql-jdbc_auth-<version>.x64.dll' en el java.library.path (ver README).
#
#  Para Docker (SQL Server en contenedor Linux) se usa autenticación
#  SQL: poner DB_INTEGRATED_SECURITY=false y pasar DB_USER/DB_PASSWORD.
# ------------------------------------------------------------
app.db.host=${DB_HOST:localhost}
app.db.port=${DB_PORT:1433}
app.db.name=${DB_NAME:ParquesNacionalesDB}
app.db.integrated-security=${DB_INTEGRATED_SECURITY:true}

spring.datasource.url=jdbc:sqlserver://${app.db.host}:${app.db.port};databaseName=${app.db.name};integratedSecurity=${app.db.integrated-security};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# El pool no debe fallar el arranque si la base aún no responde;
# el DatabaseInitializer se encarga de esperar y crear la base.
spring.datasource.hikari.initialization-fail-timeout=-1

# ------------------------------------------------------------
#  Thymeleaf
# ------------------------------------------------------------
spring.thymeleaf.cache=false

# ------------------------------------------------------------
#  Subida de archivos (importación CSV)
# ------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta donde se guardan los XML generados por la importación
app.importacion.carpeta-xml=${XML_DIR:xml-generados}

# Carpeta desde la que SQL Server lee los CSV de organizaciones distinguidas.
# Debe coincidir con la ruta base del procedimiento ImportarOrganizacionesDistinguidas
# (C:\Importaciones\). El servicio guarda aquí el archivo subido antes de invocar el SP.
app.importacion.carpeta-csv=${CSV_DIR:C:/Importaciones}
